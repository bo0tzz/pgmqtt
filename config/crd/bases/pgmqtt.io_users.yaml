apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: users.pgmqtt.io
spec:
  group: pgmqtt.io
  names:
    kind: User
    listKind: UserList
    plural: users
    singular: user
    shortNames:
      - mqu
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Username
          type: string
          jsonPath: .spec.username
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          description: User configures an MQTT user account managed by pgmqttd. Exactly one Pod (the leader) reconciles each User into a row in the broker's Postgres `users` table.
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              description: UserSpec defines the desired state of User.
              type: object
              properties:
                username:
                  description: |
                    MQTT username. Defaults to `metadata.name` when empty.
                  type: string
                passwordSecretRef:
                  description: |
                    References an existing Secret holding the password.
                    Omit to have the reconciler generate a credentials Secret
                    named `<metadata.name>-mqtt-credentials` containing
                    `username`, `password`, `host`, `port`, `ws-port`,
                    `uri`, and `ws-uri`.
                  type: object
                  properties:
                    name:
                      type: string
                    key:
                      type: string
                    optional:
                      type: boolean
                  required:
                    - name
            status:
              description: UserStatus defines the observed state of User.
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      observedGeneration:
                        type: integer
                        format: int64
                    required:
                      - type
                      - status
                credentialsSecretRef:
                  type: object
                  properties:
                    name:
                      type: string
                  required:
                    - name
                observedSecretHash:
                  type: string
