# Default values for pgmqtt.

## Number of pgmqttd Pods. Each Pod is fully stateless w.r.t. local state;
## scale freely.
replicaCount: 2

image:
  repository: ghcr.io/bo0tzz/pgmqtt
  tag: ""           # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

## Postgres connection. Either set existingSecret to a Secret containing a
## "url" key (e.g. one provisioned by CloudNativePG) or set the URL directly.
database:
  url: ""
  existingSecret: ""
  existingSecretKey: "url"
  ## Per-statement timeout (ms) applied to every connection from the
  ## broker's pgxpool. Bounds wedged Postgres so publisher dispatch
  ## can't hang past keepalive. 0 disables (PG default).
  statementTimeoutMs: 30000

## Authentication. The broker reads `users` from Postgres (seeded by the
## operator's User CR or by you directly).
auth:
  ## Accept CONNECT without username/password. Leave false in production.
  ## Useful for test rigs and conformance suites that don't seed users.
  allowAnonymous: false

## Extra env vars injected into the broker container. Use for ad-hoc tuning
## or any PGMQTT_* knob the chart doesn't expose explicitly.
##   extraEnv:
##     - name: PGMQTT_LOG_LEVEL
##       value: debug
extraEnv: []

## Bulk-load env from ConfigMaps/Secrets without enumerating each key in
## extraEnv. Useful for sharing tuning blocks across installs or pulling
## sensitive knobs from a Secret. Each entry follows the standard EnvFromSource
## schema:
##   extraEnvFrom:
##     - secretRef:
##         name: pgmqtt-tuning
##     - configMapRef:
##         name: pgmqtt-flags
extraEnvFrom: []

## Logger configuration. `format: text` is human-readable for `kubectl logs`;
## `format: json` emits one JSON object per line, ready for ingestion by log
## aggregation systems (Loki, Elasticsearch, Datadog, ...) without a custom
## text-format extractor.
logging:
  format: text

## TCP / WS listener configuration.
listeners:
  tcp:
    enabled: true
    port: 1883
  ws:
    enabled: true
    port: 8083

## Service exposing the broker. Use ClusterIP behind your TLS terminator
## (Nginx stream / HAProxy / ingress-nginx tcp-services) for tls://1883;
## a normal HTTPS proxy works for wss://8083.
service:
  type: ClusterIP
  annotations: {}
  ## externalTrafficPolicy is honoured for type=LoadBalancer / NodePort.
  ## Set to "Local" to preserve client source IPs (and skip the extra
  ## hop) on LB-exposed deployments. Empty leaves the cluster default.
  externalTrafficPolicy: ""
  ## loadBalancerIP requests a specific LB IP from the cloud controller.
  ## Empty lets the controller choose. Ignored for type=ClusterIP.
  loadBalancerIP: ""
  ## loadBalancerSourceRanges restricts which CIDRs can reach the LB.
  ## Strongly recommended for type=LoadBalancer in public clouds.
  ##   loadBalancerSourceRanges:
  ##     - 10.0.0.0/8
  ##     - 192.168.0.0/16
  loadBalancerSourceRanges: []

## Optional ServiceMonitor for prometheus-operator. Disabled by default; set
## to true if you have prometheus-operator installed. The metrics endpoint
## listens on metricsPort (defaults below) and exports pgmqtt_* counters
## plus Go runtime metrics + pgxpool stats.
serviceMonitor:
  enabled: false
  ## Scrape interval; passed straight through to the ServiceMonitor spec.
  interval: 30s
  ## Optional path; default /metrics matches the broker's exposed handler.
  path: /metrics

metrics:
  enabled: true
  port: 9090

## PodDisruptionBudget. Default minAvailable=1 prevents a rolling cluster
## upgrade from taking every replica down at once. Set to false if you
## prefer to manage disruption budgets out-of-band.
podDisruptionBudget:
  enabled: true
  minAvailable: 1
  ## Use maxUnavailable instead by setting it and clearing minAvailable.
  maxUnavailable: ""

## HorizontalPodAutoscaler. Off by default — enable once metrics are scraped.
## CPU is the cheapest signal; for connection-driven scaling use the custom
## metrics block (e.g. against `pgmqtt_connections` from the ServiceMonitor).
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: ""
  customMetrics: []
  # Example using prometheus-adapter exposed `pgmqtt_connections`:
  # customMetrics:
  #   - type: Pods
  #     pods:
  #       metric:
  #         name: pgmqtt_connections
  #       target:
  #         type: AverageValue
  #         averageValue: "1000"

## NetworkPolicy. Off by default; enable to lock down broker→postgres egress
## and broker ingress. The ingress block is permissive when `from` is empty
## (allow all sources, restricted to broker ports). Provide explicit pod or
## namespace selectors in production.
networkPolicy:
  enabled: false
  ingress:
    from: []
  egress:
    postgresPort: 5432
    postgres: []
    # Example: pin egress to a CloudNativePG-managed cluster.
    # postgres:
    #   - podSelector:
    #       matchLabels:
    #         cnpg.io/cluster: my-cluster
    kubernetesAPI: []
    # Example for the cluster's API endpoint(s):
    # kubernetesAPI:
    #   - ipBlock:
    #       cidr: 10.0.0.1/32

## helm test target. Spins up a mosquitto Pod that does a pub/sub round-trip
## against the broker. Requires a pre-existing credentials Secret — easiest
## is to apply a User CR named e.g. "smoketest" before `helm test pgmqtt`.
tests:
  enabled: true
  image: eclipse-mosquitto:2.0
  credentialsSecret: smoketest-mqtt-credentials

## Optional in-cluster MQTT web client. We don't ship a UI we wrote ourselves;
## this section deploys a third-party client (default: EMQX's MQTTX Web) as
## an extra Deployment + Service. The UI is a static SPA that connects to
## the broker via WebSocket from the user's browser — the user will have to
## paste credentials they pull from the User CR's auto-generated Secret
## (browsers can't read kube secrets). See docs/UI.md for the workflow.
##
## To enable:  helm install ... --set ui.enabled=true
ui:
  enabled: false
  image:
    # MQTTX Web — EMQX's open-source MQTT 5 browser client. Multi-arch
    # (amd64 + arm64), ~53 MB, exposes port 80, pure static (no backend).
    # Pinned for reproducibility; bump as new stable tags ship.
    repository: emqx/mqttx-web
    tag: v1.13.0
    pullPolicy: IfNotPresent
  containerPort: 80
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      memory: 256Mi
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false  # nginx writes /var/cache; flip if running under restricted SCC.
    capabilities:
      drop:
        - ALL

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 512Mi

## Annotations applied to every broker Pod template. Useful for things like
## Prometheus scrape hints, Vault sidecar injection, or operator-required keys.
podAnnotations: {}
## Extra labels applied to every broker Pod (in addition to chart selector
## labels). Selector labels are NOT extended by this — keep selector stability.
podLabels: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

## Image pull secrets referenced by the broker Pod spec. Pass a list of objects
## with a `name` field, e.g. `[{name: my-registry-creds}]`.
imagePullSecrets: []

## Convenience knob that renders a soft (preferredDuringSchedulingIgnoredDuringExecution)
## podAntiAffinity rule keyed on `kubernetes.io/hostname`, so replicas spread
## across nodes when capacity allows but still schedule on a single node when
## that's the only choice. Disabled by default; set `enabled: true` to opt in.
##
## For a hard rule (requiredDuringSchedulingIgnoredDuringExecution) or any
## other non-trivial topology shape, leave this off and use `affinity` below.
podAntiAffinity:
  enabled: false
  ## Weight applied to the preferred rule. Higher values bias the scheduler
  ## more strongly toward spreading; 100 is the K8s convention for "this is
  ## the only preference I'm expressing".
  weight: 100

nodeSelector: {}
tolerations: []
affinity: {}
## Pod-level topology spread constraints. Use to spread replicas across zones,
## racks, or other topology keys. Each entry follows the standard K8s schema:
##   topologySpreadConstraints:
##     - maxSkew: 1
##       topologyKey: topology.kubernetes.io/zone
##       whenUnsatisfiable: ScheduleAnyway
##       labelSelector:
##         matchLabels:
##           app.kubernetes.io/name: pgmqtt
topologySpreadConstraints: []

## PriorityClass for broker Pods. Empty string uses the cluster default
## (typically zero priority). Set to `system-cluster-critical` or a custom
## class to protect the broker during node pressure / preemption.
priorityClassName: ""

## Extra volumes attached to the broker Pod. Combined with extraVolumeMounts
## below for things like CA bundles, additional credentials, or scratch tmpfs.
##   extraVolumes:
##     - name: ca-bundle
##       configMap:
##         name: my-ca-bundle
extraVolumes: []

## Extra volume mounts for the broker container. Pair with extraVolumes.
##   extraVolumeMounts:
##     - name: ca-bundle
##       mountPath: /etc/ssl/certs/ca-bundle.crt
##       subPath: ca-bundle.crt
##       readOnly: true
extraVolumeMounts: []

## Grace period the kubelet honors after sending SIGTERM before SIGKILL.
## The broker drains in-flight CONNACK/PUBLISH/SUBSCRIBE handlers and closes
## connections cleanly during this window — bump for very large fan-outs.
terminationGracePeriodSeconds: 30

## Use the host's network namespace. Almost never needed — the broker is a
## standard in-cluster TCP/WebSocket listener — but exposed for completeness
## (e.g. running on a pre-K8s VM that already has port 1883 bound).
hostNetwork: false

## DNS policy & config. Leave empty to inherit the cluster default
## (ClusterFirst, or ClusterFirstWithHostNet when hostNetwork=true).
dnsPolicy: ""
dnsConfig: {}

## RuntimeClassName. Use to schedule onto sandboxed runtimes (gVisor, Kata).
## Leave empty for the default runtime.
runtimeClassName: ""

## The broker container needs to read User CRs and write the
## controller-runtime Lease (for operator leader election) — both via the
## Kubernetes API. Mounting the SA token is required.
automountServiceAccountToken: true

## Liveness/readiness probe is a TCP connect to the MQTT port. The default
## thresholds are conservative for normal startup; production operators
## frequently bump failureThreshold / timeoutSeconds when their Postgres is
## occasionally slow (managed PG vacuums, PITR replays, etc.) so a brief
## stall doesn't restart the broker mid-stream.
probes:
  enabled: true
  liveness:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 3
    successThreshold: 1
  readiness:
    initialDelaySeconds: 2
    periodSeconds: 5
    timeoutSeconds: 1
    failureThreshold: 3
    successThreshold: 1

## Install the User CRD. Set to false if managing CRDs out-of-band.
crds:
  install: true

## Service host advertised in auto-generated User credential Secrets. Defaults
## to <release-name>.<namespace>.svc.cluster.local.
operator:
  serviceHost: ""
  ## Bcrypt cost used by the User reconciler when hashing passwords for the
  ## broker's `users` table. Library default is 10.
  bcryptCost: 10

## v5 server policy. See protocol-spec links in docs/CONFORMANCE.md.
##   receiveMaximum: cap on un-ACKed inbound QoS>0 PUBLISHes per conn.
##   keepaliveMaxSec: server cap on the negotiated keepalive interval; v5
##                    clients are notified via the ServerKeepAlive property.
##
## TopicAliasMaximum is intentionally not exposed: the broker does not
## maintain an inbound topic-alias map, so we hardcode the advertised
## value to 0 (per [MQTT-3.3.2-12], clients then never send aliases).
## Outbound aliases (server → client) are supported via the client's
## CONNECT-advertised TopicAliasMaximum.
v5:
  receiveMaximum: 100
  keepaliveMaxSec: 60

## Slow-subscriber backpressure. When a subscriber has this many rows in the
## deliveries table, new QoS-0 messages are silently dropped and new QoS>0
## messages cause that subscriber to be DISCONNECTed with reason 0x97
## (Quota Exceeded). 0 disables the cap entirely.
##
## maxConnections is a per-Pod cap on accepted TCP/WS sockets — at the cap,
## CONNACK is rejected with 0x9F and the socket closed.
##
## maxInboundMsgsPerSec is a per-conn token-bucket rate on inbound
## PUBLISH/SUBSCRIBE. Sustained over-rate triggers DISCONNECT 0x96
## (Message Rate Too High). 0 disables both knobs.
limits:
  maxQueuedDeliveriesPerClient: 10000
  maxConnections: 5000
  maxInboundMsgsPerSec: 1000
