{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pgmqtt.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pgmqtt.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "pgmqtt.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: broker
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- with .Values.networkPolicy.ingress.from }}
    - from:
        {{- toYaml . | nindent 8 }}
      ports:
        {{- if $.Values.listeners.tcp.enabled }}
        - protocol: TCP
          port: {{ $.Values.listeners.tcp.port }}
        {{- end }}
        {{- if $.Values.listeners.ws.enabled }}
        - protocol: TCP
          port: {{ $.Values.listeners.ws.port }}
        {{- end }}
        {{- if $.Values.metrics.enabled }}
        - protocol: TCP
          port: {{ $.Values.metrics.port }}
        {{- end }}
    {{- else }}
    # No `from` block — empty array would deny all ingress; omit to allow.
    - ports:
        {{- if $.Values.listeners.tcp.enabled }}
        - protocol: TCP
          port: {{ $.Values.listeners.tcp.port }}
        {{- end }}
        {{- if $.Values.listeners.ws.enabled }}
        - protocol: TCP
          port: {{ $.Values.listeners.ws.port }}
        {{- end }}
        {{- if $.Values.metrics.enabled }}
        - protocol: TCP
          port: {{ $.Values.metrics.port }}
        {{- end }}
    {{- end }}
  egress:
    # DNS — required so the pgxpool can resolve the postgres Service host.
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- with .Values.networkPolicy.egress.postgres }}
    # Postgres egress — operator picks the selector that fits their cluster.
    - to:
        {{- toYaml . | nindent 8 }}
      ports:
        - protocol: TCP
          port: {{ $.Values.networkPolicy.egress.postgresPort }}
    {{- end }}
    # Kubernetes API — required for the User-CRD reconciler (every Pod
    # runs a controller-runtime manager; one wins the K8s Lease and
    # reconciles, all need API access for the Lease + watch). When the
    # operator left this empty, the operator goroutine silently broke;
    # default to the kube-system DNS-style fallback so a misconfigured
    # NetworkPolicy doesn't take the operator down without explanation.
    {{- if .Values.networkPolicy.egress.kubernetesAPI }}
    - to:
        {{- toYaml .Values.networkPolicy.egress.kubernetesAPI | nindent 8 }}
      ports:
        - protocol: TCP
          port: 443
    {{- else }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: default
          podSelector:
            matchLabels:
              component: apiserver
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
    {{- end }}
{{- end }}
