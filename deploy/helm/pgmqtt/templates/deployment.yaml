apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pgmqtt.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pgmqtt.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "pgmqtt.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pgmqtt.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "pgmqtt.fullname" . }}
      automountServiceAccountToken: {{ .Values.automountServiceAccountToken }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- if .Values.hostNetwork }}
      hostNetwork: true
      {{- end }}
      {{- with .Values.dnsPolicy }}
      dnsPolicy: {{ . }}
      {{- end }}
      {{- with .Values.dnsConfig }}
      dnsConfig:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.runtimeClassName }}
      runtimeClassName: {{ . }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: pgmqttd
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: PGMQTT_DATABASE_URL
              {{- if .Values.database.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: {{ .Values.database.existingSecretKey }}
              {{- else }}
              value: {{ required "database.url is required when database.existingSecret is empty" .Values.database.url | quote }}
              {{- end }}
            - name: PGMQTT_TCP_ADDR
              value: {{ if .Values.listeners.tcp.enabled }}":{{ .Values.listeners.tcp.port }}"{{ else }}""{{ end }}
            - name: PGMQTT_WS_ADDR
              value: {{ if .Values.listeners.ws.enabled }}":{{ .Values.listeners.ws.port }}"{{ else }}""{{ end }}
            {{- with .Values.listeners.ws.allowedOrigins }}
            - name: PGMQTT_WS_ALLOWED_ORIGINS
              value: {{ join "," . | quote }}
            {{- end }}
            - name: PGMQTT_SERVICE_HOST
              value: {{ include "pgmqtt.serviceHost" . | quote }}
            - name: PGMQTT_SERVICE_PORT
              value: {{ .Values.listeners.tcp.port | quote }}
            - name: PGMQTT_SERVICE_WS_PORT
              value: {{ .Values.listeners.ws.port | quote }}
            - name: PGMQTT_RECEIVE_MAXIMUM
              value: {{ .Values.v5.receiveMaximum | quote }}
            - name: PGMQTT_KEEPALIVE_MAX_SEC
              value: {{ .Values.v5.keepaliveMaxSec | quote }}
            - name: PGMQTT_BCRYPT_COST
              value: {{ .Values.operator.bcryptCost | quote }}
            - name: PGMQTT_MAX_QUEUED_DELIVERIES_PER_CLIENT
              value: {{ .Values.limits.maxQueuedDeliveriesPerClient | quote }}
            - name: PGMQTT_MAX_CONNECTIONS
              value: {{ .Values.limits.maxConnections | quote }}
            - name: PGMQTT_MAX_INBOUND_MSGS_PER_SEC
              value: {{ .Values.limits.maxInboundMsgsPerSec | quote }}
            - name: PGMQTT_MAX_CONNECTS_PER_IP_PER_SEC
              value: {{ .Values.limits.maxConnectsPerIPPerSec | quote }}
            - name: PGMQTT_MAX_AUTH_FAILURES_PER_IP_PER_MIN
              value: {{ .Values.limits.maxAuthFailuresPerIPPerMin | quote }}
            - name: PGMQTT_MAX_PACKET_SIZE
              value: {{ .Values.limits.maxPacketSize | quote }}
            - name: PGMQTT_PG_STATEMENT_TIMEOUT_MS
              value: {{ .Values.database.statementTimeoutMs | quote }}
            - name: PGMQTT_LOG_FORMAT
              value: {{ .Values.logging.format | quote }}
            {{- if .Values.auth.allowAnonymous }}
            - name: PGMQTT_ALLOW_ANONYMOUS
              value: "true"
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            - name: PGMQTT_METRICS_ADDR
              value: {{ if .Values.metrics.enabled }}":{{ .Values.metrics.port }}"{{ else }}""{{ end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            {{- if .Values.listeners.tcp.enabled }}
            - name: mqtt
              containerPort: {{ .Values.listeners.tcp.port }}
              protocol: TCP
            {{- end }}
            {{- if .Values.listeners.ws.enabled }}
            - name: mqtt-ws
              containerPort: {{ .Values.listeners.ws.port }}
              protocol: TCP
            {{- end }}
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            {{- end }}
          {{- if .Values.probes.enabled }}
          livenessProbe:
            tcpSocket:
              port: {{ if .Values.listeners.tcp.enabled }}mqtt{{ else }}mqtt-ws{{ end }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds | default 5 }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds | default 10 }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds | default 1 }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold | default 3 }}
            successThreshold: {{ .Values.probes.liveness.successThreshold | default 1 }}
          readinessProbe:
            tcpSocket:
              port: {{ if .Values.listeners.tcp.enabled }}mqtt{{ else }}mqtt-ws{{ end }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds | default 2 }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds | default 5 }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds | default 1 }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold | default 3 }}
            successThreshold: {{ .Values.probes.readiness.successThreshold | default 1 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- with .Values.extraVolumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.extraVolumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.affinity .Values.podAntiAffinity.enabled }}
      affinity:
        {{- with .Values.affinity }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.podAntiAffinity.enabled }}
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: {{ .Values.podAntiAffinity.weight }}
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    {{- include "pgmqtt.selectorLabels" . | nindent 20 }}
        {{- end }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
