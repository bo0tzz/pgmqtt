apiVersion: v1
kind: Service
metadata:
  name: {{ include "pgmqtt.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pgmqtt.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "pgmqtt.selectorLabels" . | nindent 4 }}
  ports:
    {{- if .Values.listeners.tcp.enabled }}
    - name: mqtt
      port: {{ .Values.listeners.tcp.port }}
      targetPort: mqtt
      protocol: TCP
    {{- end }}
    {{- if .Values.listeners.ws.enabled }}
    - name: mqtt-ws
      port: {{ .Values.listeners.ws.port }}
      targetPort: mqtt-ws
      protocol: TCP
    {{- end }}
