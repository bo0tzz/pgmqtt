# ClusterRole: cluster-wide watch on User CRs (the User CRD is namespaced
# but the operator watches every namespace). Notably does NOT include
# `secrets` verbs — see the Role below for that. A pod compromise on this
# ClusterRole grants observability of Users only, not the ability to read
# arbitrary Secrets cluster-wide.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "pgmqtt.fullname" . }}
  labels:
    {{- include "pgmqtt.labels" . | nindent 4 }}
rules:
  - apiGroups: ["pgmqtt.io"]
    resources: ["users"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["pgmqtt.io"]
    resources: ["users/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["pgmqtt.io"]
    resources: ["users/finalizers"]
    verbs: ["update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "pgmqtt.fullname" . }}
  labels:
    {{- include "pgmqtt.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "pgmqtt.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "pgmqtt.fullname" . }}
    namespace: {{ .Release.Namespace }}
---
# Namespace-scoped Role: Secret CRUD lives here. The operator's
# controller-runtime cache is constrained to this same namespace
# (internal/operator/manager.go), so it never reads Secrets outside
# the release namespace at runtime either. User CRs in other namespaces
# will reconcile but their Secret writes will fail with an RBAC error —
# that's deliberate. Multi-namespace User support would need per-
# namespace Roles + a widened cache, which is an explicit follow-up
# rather than a blanket cluster grant.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "pgmqtt.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pgmqtt.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "pgmqtt.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pgmqtt.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "pgmqtt.fullname" . }}-secrets
subjects:
  - kind: ServiceAccount
    name: {{ include "pgmqtt.fullname" . }}
    namespace: {{ .Release.Namespace }}
---
# Namespace-scoped Role for the controller-runtime K8s Lease leader
# election. The Lease lives in the same namespace as the broker Pods;
# only that namespace needs leases r/w on the broker SA.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "pgmqtt.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pgmqtt.labels" . | nindent 4 }}
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "pgmqtt.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pgmqtt.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "pgmqtt.fullname" . }}-leader-election
subjects:
  - kind: ServiceAccount
    name: {{ include "pgmqtt.fullname" . }}
    namespace: {{ .Release.Namespace }}
