# ClusterRole: cluster-wide watch on User CRs and create/update of the
# generated <name>-mqtt-credentials Secret in the same namespace as the
# User CR. The User CRD is namespaced and intentionally lives anywhere —
# operators put Users in whatever namespace makes sense for their
# workload (per-app, per-team, etc.). Cross-namespace Secret RBAC is the
# trade-off for that flexibility — a compromised broker pod can read
# any Secret cluster-wide. To narrow scope, fork the chart and replace
# this ClusterRole with a per-namespace Role wherever Users live.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "pgmqtt.fullname" . }}
  labels:
    {{- include "pgmqtt.labels" . | nindent 4 }}
rules:
  - apiGroups: ["pgmqtt.io"]
    resources: ["users"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["pgmqtt.io"]
    resources: ["users/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["pgmqtt.io"]
    resources: ["users/finalizers"]
    verbs: ["update"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "pgmqtt.fullname" . }}
  labels:
    {{- include "pgmqtt.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "pgmqtt.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "pgmqtt.fullname" . }}
    namespace: {{ .Release.Namespace }}
---
# Namespace-scoped Role for the controller-runtime K8s Lease leader
# election. The Lease lives in the same namespace as the broker Pods;
# only that namespace needs leases r/w on the broker SA.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "pgmqtt.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pgmqtt.labels" . | nindent 4 }}
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "pgmqtt.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pgmqtt.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "pgmqtt.fullname" . }}-leader-election
subjects:
  - kind: ServiceAccount
    name: {{ include "pgmqtt.fullname" . }}
    namespace: {{ .Release.Namespace }}
