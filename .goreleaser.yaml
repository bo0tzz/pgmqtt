# GoReleaser config — produces static linux/{amd64,arm64} binaries plus
# a signed checksum file for tag pushes. Runs from the GitHub Actions
# workflow at .github/workflows/release.yml when a `vX.Y.Z` tag is pushed.
#
# We deliberately do NOT manage Docker images here — the existing
# docker/build-push-action in ci.yml already produces multi-arch images on
# tag pushes and tags them with the ref-name. Keeping the two paths
# separate avoids cross-tool surprises.
version: 2

project_name: pgmqttd

before:
  hooks:
    - go mod tidy

builds:
  - id: pgmqttd
    main: ./cmd/pgmqttd
    binary: pgmqttd
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: pgmqttd
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - docs/*.md

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot+{{.ShortCommit}}"

changelog:
  # Use git log between tags for the GitHub release body.
  use: git
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Other
      order: 999

release:
  # Don't auto-create a GitHub release — operator runs goreleaser locally
  # and inspects the artefacts. Flip to `mode: replace` and remove
  # `disable: "true"` if you want the workflow below to actually publish
  # a release after you've reviewed the dist/ output.
  disable: "true"
