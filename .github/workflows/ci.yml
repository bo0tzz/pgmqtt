name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: govulncheck
        # Pinned to @latest deliberately. Unlike build-time tooling where
        # reproducibility matters, a vulnerability scanner is *more* useful
        # the newer it is — each release ships a larger known-vuln database
        # and improved call-graph analysis. Pinning would mean missing
        # disclosures published after the pinned tag. Currently locally
        # clean (~10s); if a new disclosure lands in a transitive dep this
        # turns red and blocks the PR until we bump or document.
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: go test
        run: go test ./... -count=1 -timeout 5m

      - name: go test -race
        # Race detector caught a real listener bug (concurrent listeners map
        # access) during development; we keep it in CI on a separate run so
        # signal stays clear. Slower (~2x) and slightly higher-mem; fine for CI.
        run: go test ./... -count=1 -race -timeout 10m

      - name: coverage report
        run: |
          go test ./... -count=1 -coverprofile=coverage.out -covermode=atomic -timeout 10m
          go tool cover -func=coverage.out | tee coverage.txt

      - name: upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: |
            coverage.out
            coverage.txt

  helm:
    name: helm-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v5
        with:
          version: latest
      - name: lint
        run: |
          helm lint deploy/helm/pgmqtt --set database.url='postgres://x/y'
          helm template deploy/helm/pgmqtt --set database.url='postgres://x/y' > /tmp/rendered.yaml
          test -s /tmp/rendered.yaml

  conformance:
    name: paho v3+v5 (single broker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - uses: azure/setup-helm@v5
        with:
          version: latest
      - name: install paho deps
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install paho-mqtt
      - name: clone paho.mqtt.testing
        run: git clone --depth 1 https://github.com/eclipse/paho.mqtt.testing /tmp/paho
      - name: tier2 validate
        run: bash scripts/validate.sh tier2 --paho /tmp/paho
      - name: upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: conformance-${{ github.run_id }}
          path: |
            /tmp/pgmqttd-validate.log
            coverage.out
            coverage.txt
          if-no-files-found: warn
          retention-days: 14

  docker:
    name: docker
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=long

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on tag/main)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}

  smoke:
    name: smoke (helm + kind)
    runs-on: ubuntu-latest
    needs: [test, helm]
    steps:
      - uses: actions/checkout@v6
      - uses: helm/kind-action@v1
        with:
          cluster_name: pgmqtt-smoke
      - uses: azure/setup-helm@v5
        with:
          version: latest
      - name: install cloudnative-pg operator
        run: |
          CNPG_VERSION=1.29.1
          kubectl apply --server-side -f "https://github.com/cloudnative-pg/cloudnative-pg/releases/download/v${CNPG_VERSION}/cnpg-${CNPG_VERSION}.yaml"
          kubectl -n cnpg-system rollout status deployment/cnpg-controller-manager --timeout=180s
      - name: provision CNPG cluster
        run: |
          # Backs the smoke with CNPG (matches production-style deploys) so
          # the chart's default database.existingSecretKey="uri" is
          # exercised against a real CNPG <cluster>-app Secret. A regression
          # in that default — or in CNPG's Secret schema — would surface
          # here as the broker failing to start. See issue #1.
          kubectl create namespace mqtt
          kubectl apply -f .github/ci/cnpg-cluster.yaml
          # CNPG sets .status.phase asynchronously after the StatefulSet
          # rolls out; rollout status doesn't cover the bootstrap-initdb
          # step. Poll the Cluster CR.
          for _ in $(seq 1 60); do
            phase=$(kubectl -n mqtt get cluster pgmqtt-pg -o jsonpath='{.status.phase}' 2>/dev/null || true)
            echo "cluster phase: ${phase:-<unset>}"
            if [ "$phase" = "Cluster in healthy state" ]; then
              break
            fi
            sleep 5
          done
          test "$(kubectl -n mqtt get cluster pgmqtt-pg -o jsonpath='{.status.phase}')" = "Cluster in healthy state"
          kubectl -n mqtt get secret pgmqtt-pg-app -o jsonpath='{.data.uri}' >/dev/null
      - name: build image into kind
        run: |
          docker build -t pgmqtt:ci .
          kind load docker-image pgmqtt:ci --name pgmqtt-smoke
      - name: helm install
        run: |
          # No --set database.existingSecretKey override — relies on the
          # chart's default ("uri"), which is what CNPG's <cluster>-app
          # Secret actually provides. This is the regression guard for
          # issue #1.
          helm install pgmqtt deploy/helm/pgmqtt \
            --namespace mqtt \
            --set image.repository=pgmqtt \
            --set image.tag=ci \
            --set image.pullPolicy=IfNotPresent \
            --set database.existingSecret=pgmqtt-pg-app
          kubectl -n mqtt rollout status deployment/pgmqtt --timeout=180s
      - name: apply User and exercise round-trip
        run: bash .github/ci/smoke-in-cluster.sh
      - name: dump diagnostics on failure
        if: failure()
        run: |
          kubectl -n mqtt get pods
          kubectl -n mqtt logs -l app.kubernetes.io/name=pgmqtt --tail=200 || true
          kubectl -n mqtt describe cluster pgmqtt-pg || true
