name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./... -count=1 -timeout 5m

      - name: go test -race
        # Race detector caught a real listener bug (concurrent listeners map
        # access) during development; we keep it in CI on a separate run so
        # signal stays clear. Slower (~2x) and slightly higher-mem; fine for CI.
        run: go test ./... -count=1 -race -timeout 10m

      - name: coverage report
        run: |
          go test ./... -count=1 -coverprofile=coverage.out -covermode=atomic -timeout 10m
          go tool cover -func=coverage.out | tee coverage.txt

      - name: upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage.out
            coverage.txt

  helm:
    name: helm-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.1
      - name: lint
        run: |
          helm lint deploy/helm/pgmqtt --set database.url='postgres://x/y'
          helm template deploy/helm/pgmqtt --set database.url='postgres://x/y' > /tmp/rendered.yaml
          test -s /tmp/rendered.yaml

  docker:
    name: docker
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on tag/main)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ${{ github.ref == 'refs/heads/main' && format('ghcr.io/{0}:main', github.repository) || '' }}
            ${{ startsWith(github.ref, 'refs/tags/') && format('ghcr.io/{0}:{1}', github.repository, github.ref_name) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}

  smoke:
    name: smoke (helm + kind)
    runs-on: ubuntu-latest
    needs: [test, helm]
    steps:
      - uses: actions/checkout@v4
      - uses: helm/kind-action@v1
        with:
          cluster_name: pgmqtt-smoke
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.1
      - name: install postgres in cluster
        run: |
          kubectl create namespace mqtt
          kubectl -n mqtt apply -f .github/ci/postgres.yaml
          kubectl -n mqtt rollout status statefulset/postgres --timeout=180s
      - name: build image into kind
        run: |
          docker build -t pgmqtt:ci .
          kind load docker-image pgmqtt:ci --name pgmqtt-smoke
      - name: helm install
        run: |
          helm install pgmqtt deploy/helm/pgmqtt \
            --namespace mqtt \
            --set image.repository=pgmqtt \
            --set image.tag=ci \
            --set image.pullPolicy=IfNotPresent \
            --set database.url='postgres://pgmqtt:pgmqtt@postgres.mqtt.svc:5432/pgmqtt?sslmode=disable'
          kubectl -n mqtt rollout status deployment/pgmqtt --timeout=180s
      - name: apply User and exercise round-trip
        run: bash .github/ci/smoke-in-cluster.sh
