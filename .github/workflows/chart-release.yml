name: chart-release

# Publish the Helm chart to ghcr.io as an OCI artefact on every `vX.Y.Z`
# tag push. The chart version + appVersion are rewritten from the tag
# (leading `v` stripped) so the chart we ship matches the binary tag.
#
# Consumers install with:
#   helm install pgmqtt oci://ghcr.io/<owner>/charts/pgmqtt --version X.Y.Z
#
# We deliberately do NOT maintain a gh-pages-hosted HTTP repo — the OCI
# path is the only supported distribution channel.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to package (e.g. v0.1.1) — manual dry-run only, does not push'
        required: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: package + push to ghcr.io
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: azure/setup-helm@v4
        with:
          version: latest

      - name: derive chart version from tag
        id: ver
        run: |
          ref="${{ github.event.inputs.tag || github.ref_name }}"
          # Strip a leading 'v'; refuse anything that isn't a semver-shaped tag.
          version="${ref#v}"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::tag '$ref' is not semver-shaped (expected vX.Y.Z[-pre])"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: lint chart
        run: helm lint deploy/helm/pgmqtt --set database.url='postgres://x/y'

      - name: package chart
        run: |
          mkdir -p dist
          helm package deploy/helm/pgmqtt \
            --version "${{ steps.ver.outputs.version }}" \
            --app-version "${{ steps.ver.outputs.version }}" \
            --destination dist
          ls -la dist/

      - name: log into ghcr.io
        # Skip on workflow_dispatch (manual dry-run) so packaging works
        # locally without surfacing the registry login as a perceived "push".
        if: github.event_name == 'push'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io \
              --username "${{ github.actor }}" \
              --password-stdin

      - name: push chart to ghcr.io
        if: github.event_name == 'push'
        run: |
          # Owner is lowercased so push works for orgs/users with capitals.
          owner="${{ github.repository_owner }}"
          owner_lc="$(echo "$owner" | tr '[:upper:]' '[:lower:]')"
          helm push \
            "dist/pgmqtt-${{ steps.ver.outputs.version }}.tgz" \
            "oci://ghcr.io/${owner_lc}/charts"

      - name: upload packaged chart artefact
        uses: actions/upload-artifact@v4
        with:
          name: pgmqtt-chart
          path: dist/*.tgz
