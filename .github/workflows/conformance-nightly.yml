name: conformance-nightly

# Tier-2 conformance: Paho MQTT v3 + v5 single-broker. Daily 03:00 UTC.
# Doesn't gate PRs (covered by ci.yml's tier-1 surface). Drift detector for
# protocol-level regressions — the kind that pass `go test -race` but fail
# real clients (e.g. v5 reason-code shapes, retain semantics, will-delay
# timing). Tier-1 is fast (<2m); the v3+v5 paho run dominates this workflow
# at ~6m, hence the nightly cadence.

on:
  schedule:
    # 03:00 UTC every day — well outside business hours, well after any
    # release CI from the prior day's tags has cleared.
    - cron: '0 3 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  paho-conformance:
    name: paho v3 + v5 (single broker)
    runs-on: ubuntu-latest
    # Plenty of headroom over the measured ~6m12s wall-clock for tier2.
    # If this trips often, look for a regression before bumping.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - uses: azure/setup-helm@v5
        with:
          version: latest

      - name: install paho deps
        run: |
          python3 -m pip install --upgrade pip
          # paho.mqtt.testing's interoperability tests speak the wire
          # protocol directly; the only runtime dep is paho-mqtt itself
          # (the python client) for the publishers' side of the suite.
          python3 -m pip install paho-mqtt

      - name: clone paho.mqtt.testing
        run: |
          # The conformance suite isn't versioned via tags; pin to a
          # specific commit if a future paho update breaks this. As of
          # 2026-05 main is stable.
          git clone --depth 1 https://github.com/eclipse/paho.mqtt.testing /tmp/paho

      - name: tier2 validate
        run: bash scripts/validate.sh tier2 --paho /tmp/paho

      - name: upload tier2 artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tier2-conformance-${{ github.run_id }}
          path: |
            /tmp/pgmqttd-validate.log
            coverage.out
            coverage.txt
          if-no-files-found: warn
          retention-days: 14
